<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>MaestroMX - Trabajos cerca de ti</title>
    <link rel="icon" href="assets/favicon.ico">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <!-- ============================================
    SPLASH SCREEN
    ============================================ -->
    <div id="splashScreen">
        <div class="splash-content">
            <div class="splash-logo">🛠️</div>
            <h1 class="splash-title">Maestro<span>MX</span></h1>
            <p class="splash-subtitle">Trabajos cerca de ti</p>
            <div class="splash-loader">
                <div class="loader-bar"></div>
            </div>
        </div>
    </div>

    <!-- ============================================
    APP PRINCIPAL (oculta hasta que termine splash)
    ============================================ -->
    <div id="app" style="display: none;">

        <!-- ============================================
        HEADER - Minimalista
        ============================================ -->
        <header class="app-header">
            <div class="header-left">
                <span class="header-logo">🛠️</span>
                <span class="header-title">MaestroMX</span>
            </div>
            <div class="header-right">
                <button class="header-btn" onclick="toggleSearch()">
                    <i class="fas fa-search"></i>
                </button>
                <button class="header-btn" onclick="window.location.href='admin.html'">
                    <i class="fas fa-user-cog"></i>
                </button>
            </div>
        </header>

        <!-- ============================================
        BÚSQUEDA RÁPIDA (desplegable)
        ============================================ -->
        <div id="searchBar" class="search-bar" style="display: none;">
            <input type="text" id="searchInput" placeholder="🔍 Buscar trabajo..." class="search-input-big">
        </div>

        <!-- ============================================
        CATEGORÍAS - Íconos gigantes
        ============================================ -->
        <section class="categories-section">
            <div class="categories-scroll" id="categoryScroll">
                <button class="category-pill active" data-category="all">
                    <span class="pill-icon">📋</span>
                    <span class="pill-label">Todos</span>
                </button>
                <!-- Las categorías se generan con JavaScript -->
            </div>
        </section>

        <!-- ============================================
        LISTA DE TRABAJOS - Tarjetas visuales
        ============================================ -->
        <section class="jobs-section">
            <div class="jobs-header">
                <h2 class="jobs-title">
                    <span id="jobsCount">0</span> trabajos disponibles
                </h2>
                <button class="filter-btn" onclick="toggleFilters()">
                    <i class="fas fa-sliders-h"></i>
                </button>
            </div>

            <div class="jobs-grid" id="jobsContainer">
                <!-- Tarjetas generadas por JavaScript -->
            </div>

            <div id="loadingJobs" class="loading-state">
                <div class="loading-spinner"></div>
                <p>Cargando trabajos...</p>
            </div>

            <div id="emptyState" class="empty-state" style="display: none;">
                <div class="empty-icon">🔍</div>
                <h3>No hay trabajos disponibles</h3>
                <p>Vuelve más tarde o contáctanos para publicar</p>
                <button class="btn-primary" onclick="contactAdmin()">
                    <i class="fas fa-phone"></i> Publicar trabajo
                </button>
            </div>
        </section>

        <!-- ============================================
        BOTÓN FLOTANTE - Publicar trabajo
        ============================================ -->
        <button class="fab" onclick="contactAdmin()">
            <i class="fas fa-plus"></i>
        </button>

        <!-- ============================================
        FOOTER - Simple
        ============================================ -->
        <footer class="app-footer">
            <p>🛠️ MaestroMX · Trabajos verificados</p>
            <p class="footer-small">Hecho con ❤️ para conectar talento</p>
        </footer>

    </div>

    <!-- ============================================
    SCRIPTS
    ============================================ -->
    <script src="config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
