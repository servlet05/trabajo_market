<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - MaestroMX</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #F4F6F9;
            color: #1A202C;
        }
        
        /* LOGIN */
        #loginContainer {
            max-width: 400px;
            margin: 5rem auto;
            padding: 2rem;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        #loginContainer h2 {
            color: #FF7F00;
            text-align: center;
            margin-bottom: 0.5rem;
        }
        #loginContainer p {
            color: #8A94A6;
            text-align: center;
            margin-bottom: 1.5rem;
        }
        #loginContainer input {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid #E2E8F0;
            border-radius: 12px;
            font-size: 1rem;
            margin-bottom: 1rem;
            outline: none;
            transition: all 0.3s;
        }
        #loginContainer input:focus {
            border-color: #FF7F00;
            box-shadow: 0 0 0 4px rgba(255,127,0,0.1);
        }
        .btn-login {
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(135deg, #FF7F00 0%, #FFA500 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-login:active {
            transform: scale(0.95);
        }
        #loginError {
            color: #FC8181;
            text-align: center;
            margin-top: 1rem;
        }

        /* PANEL ADMIN */
        #adminPanel {
            display: none;
            max-width: 900px;
            margin: 0 auto;
            padding: 1rem;
        }
        .admin-header {
            background: #FF7F00;
            padding: 1rem 1.5rem;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            margin-bottom: 2rem;
        }
        .admin-header .logo {
            font-size: 1.5rem;
            font-weight: 700;
        }
        .admin-header .logo span {
            opacity: 0.8;
        }
        .btn-logout {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        .btn-logout:hover {
            background: rgba(255,255,255,0.3);
        }

        /* ESTADÍSTICAS */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: white;
            padding: 1.2rem;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .stat-card .number {
            font-size: 2rem;
            font-weight: 700;
            color: #FF7F00;
        }
        .stat-card .label {
            font-size: 0.8rem;
            color: #8A94A6;
        }

        /* BOTONES DE ACCIÓN */
        .actions {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        .btn-action {
            padding: 0.6rem 1.5rem;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-action:active {
            transform: scale(0.95);
        }
        .btn-action.primary {
            background: #FF7F00;
            color: white;
        }
        .btn-action.primary:hover {
            background: #E65C00;
        }
        .btn-action.secondary {
            background: #E2E8F0;
            color: #2D3748;
        }
        .btn-action.danger {
            background: #FC8181;
            color: white;
        }

        /* FORMULARIO */
        #jobForm {
            display: none;
            background: white;
            padding: 1.5rem;
            border-radius: 16px;
            margin-bottom: 2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        #jobForm h3 {
            color: #FF7F00;
            margin-bottom: 1rem;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
        }
        .form-grid .full-width {
            grid-column: 1 / -1;
        }
        #jobForm label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #2D3748;
            display: block;
            margin-bottom: 0.2rem;
        }
        #jobForm input, #jobForm select, #jobForm textarea {
            width: 100%;
            padding: 0.6rem;
            border: 2px solid #E2E8F0;
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s;
            font-family: inherit;
        }
        #jobForm input:focus, #jobForm select:focus, #jobForm textarea:focus {
            border-color: #FF7F00;
            box-shadow: 0 0 0 4px rgba(255,127,0,0.1);
        }
        #jobForm textarea {
            min-height: 80px;
            resize: vertical;
        }
        .form-buttons {
            display: flex;
            gap: 0.8rem;
            margin-top: 1rem;
        }

        /* LISTA DE TRABAJOS */
        .job-item {
            background: white;
            padding: 1rem 1.2rem;
            border-radius: 12px;
            margin-bottom: 0.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            transition: all 0.3s;
        }
        .job-item:hover {
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }
        .job-item .info {
            flex: 1;
            min-width: 200px;
        }
        .job-item .info .title {
            font-weight: 600;
        }
        .job-item .info .meta {
            font-size: 0.8rem;
            color: #8A94A6;
        }
        .job-item .actions {
            display: flex;
            gap: 0.5rem;
            margin: 0;
        }
        .btn-sm {
            padding: 0.3rem 0.8rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s;
        }
        .btn-sm.edit {
            background: #EBF5FF;
            color: #3182CE;
        }
        .btn-sm.delete {
            background: #FFF5F5;
            color: #E53E3E;
        }
        .btn-sm:active {
            transform: scale(0.9);
        }
        .status-badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .status-available {
            background: #C6F6D5;
            color: #276749;
        }
        .status-progress {
            background: #FEEBC8;
            color: #9C4221;
        }
        .status-closed {
            background: #FED7D7;
            color: #9B2C2C;
        }

        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .job-item {
                flex-direction: column;
                align-items: stretch;
            }
            .job-item .actions {
                justify-content: flex-end;
            }
        }
    </style>
</head>
<body>

    <!-- ============================================
    LOGIN
    ============================================ -->
    <div id="loginContainer">
        <h2>🔐 Panel Admin</h2>
        <p>Ingresa la contraseña para gestionar trabajos</p>
        <input type="password" id="adminPassword" placeholder="Contraseña" onkeydown="if(event.key==='Enter') loginAdmin()">
        <button class="btn-login" onclick="loginAdmin()">
            <i class="fas fa-sign-in-alt"></i> Acceder
        </button>
        <p id="loginError"></p>
    </div>

    <!-- ============================================
    PANEL ADMIN
    ============================================ -->
    <div id="adminPanel">
        <!-- Header -->
        <div class="admin-header">
            <div class="logo">🛠️ Maestro<span>MX</span> <span style="font-size:0.8rem;background:rgba(255,255,255,0.2);padding:0.2rem 0.8rem;border-radius:50px;margin-left:0.5rem;">Admin</span></div>
            <button class="btn-logout" onclick="logoutAdmin()"><i class="fas fa-sign-out-alt"></i> Salir</button>
        </div>

        <!-- Estadísticas -->
        <div class="stats-grid" id="stats">
            <div class="stat-card"><div class="number" id="statTotal">0</div><div class="label">Total</div></div>
            <div class="stat-card"><div class="number" id="statAvailable">0</div><div class="label">🟢 Disponibles</div></div>
            <div class="stat-card"><div class="number" id="statProgress">0</div><div class="label">🟡 En proceso</div></div>
            <div class="stat-card"><div class="number" id="statClosed">0</div><div class="label">🔴 Cerrados</div></div>
        </div>

        <!-- Acciones -->
        <div class="actions">
            <button class="btn-action primary" onclick="showNewJobForm()"><i class="fas fa-plus"></i> Nuevo Trabajo</button>
            <button class="btn-action secondary" onclick="exportJobs()"><i class="fas fa-download"></i> Exportar JSON</button>
            <button class="btn-action secondary" onclick="loadJobsAdmin()"><i class="fas fa-sync"></i> Actualizar</button>
        </div>

        <!-- Formulario -->
        <div id="jobForm">
            <h3 id="formTitle">➕ Nuevo Trabajo</h3>
            <input type="hidden" id="editJobId">
            <div class="form-grid">
                <div>
                    <label>Título *</label>
                    <input type="text" id="jobTitle" placeholder="Ej: Reparación de PC">
                </div>
                <div>
                    <label>Categoría *</label>
                    <select id="jobCategory">
                        <option value="💻 Sistemas">💻 Sistemas</option>
                        <option value="⚡ Electricista">⚡ Electricista</option>
                        <option value="🔧 Plomero">🔧 Plomero</option>
                        <option value="🪚 Mueblero">🪚 Mueblero</option>
                        <option value="🔩 Ferretero">🔩 Ferretero</option>
                        <option value="🛠️ Handyman">🛠️ Handyman</option>
                        <option value="🌿 Jardinero">🌿 Jardinero</option>
                        <option value="🎨 Pintor">🎨 Pintor</option>
                        <option value="🪵 Carpintero">🪵 Carpintero</option>
                        <option value="🧹 Limpieza">🧹 Limpieza</option>
                    </select>
                </div>
                <div>
                    <label>Ubicación *</label>
                    <input type="text" id="jobLocation" placeholder="Ej: CDMX, Roma Norte">
                </div>
                <div>
                    <label>Precio</label>
                    <input type="text" id="jobPrice" placeholder="Ej: $500 MXN">
                </div>
                <div>
                    <label>Fecha</label>
                    <input type="date" id="jobDate">
                </div>
                <div>
                    <label>Hora</label>
                    <input type="time" id="jobTime">
                </div>
                <div>
                    <label>Estado</label>
                    <select id="jobStatus">
                        <option value="available">🟢 Disponible</option>
                        <option value="progress">🟡 En proceso</option>
                        <option value="closed">🔴 Cerrado</option>
                    </select>
                </div>
                <div>
                    <label>Código</label>
                    <input type="text" id="jobCode" placeholder="Ej: MX-2026-001">
                </div>
                <div class="full-width">
                    <label>Descripción *</label>
                    <textarea id="jobDescription" placeholder="Describe el trabajo en detalle..."></textarea>
                </div>
                <div class="full-width">
                    <label style="margin-bottom:0.5rem;">📞 Métodos de Contacto</label>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.8rem;">
                        <div><input type="text" id="contactPhone" placeholder="Teléfono (ej: 5512345678)"></div>
                        <div><input type="text" id="contactWhatsapp" placeholder="WhatsApp (ej: 5512345678)"></div>
                        <div><input type="email" id="contactEmail" placeholder="Email"></div>
                        <div><input type="url" id="contactWebsite" placeholder="Sitio Web"></div>
                    </div>
                </div>
            </div>
            <div class="form-buttons">
                <button class="btn-action primary" onclick="saveJob()"><i class="fas fa-save"></i> Guardar</button>
                <button class="btn-action secondary" onclick="cancelForm()">Cancelar</button>
            </div>
        </div>

        <!-- Lista de trabajos -->
        <div id="jobsList"></div>
    </div>

    <script>
        // ============================================
        // CONFIGURACIÓN
        // ============================================
        const ADMIN_PASSWORD = 'maestromx2026';  // ← CAMBIA ESTA CONTRASEÑA
        const STORAGE_KEY = 'maestromx_jobs';

        // Datos de ejemplo
        const SAMPLE_JOBS = [
            {
                id: 1,
                title: "Reparación de PC e instalación de redes",
                category: "💻 Sistemas",
                location: "CDMX, Roma Norte",
                price: "$500 MXN",
                date: "2026-07-10",
                time: "14:00",
                status: "available",
                code: "MX-2026-001",
                description: "Se necesita técnico para revisar 5 PCs con problemas de rendimiento e instalar cableado de red.",
                contact: { phone: "5512345678", whatsapp: "5512345678", email: "empresa@ejemplo.com", website: null },
                views: 12,
                created_at: "2026-07-08T10:00:00Z"
            },
            {
                id: 2,
                title: "Instalación de contactos y lámparas",
                category: "⚡ Electricista",
                location: "GDL, Centro",
                price: "$800 MXN",
                date: "2026-07-11",
                time: "10:00",
                status: "available",
                code: "MX-2026-002",
                description: "Instalación de 4 contactos nuevos y 3 lámparas LED en departamento remodelado.",
                contact: { phone: "3312345678", whatsapp: "3312345678", email: null, website: null },
                views: 8,
                created_at: "2026-07-08T11:00:00Z"
            }
        ];

        // ============================================
        // VARIABLES
        // ============================================
        let jobs = [];
        let editIndex = null;

        // ============================================
        // LOGIN
        // ============================================
        function loginAdmin() {
            const password = document.getElementById('adminPassword').value;
            if (password === ADMIN_PASSWORD) {
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                sessionStorage.setItem('maestromx_admin', 'logged');
                loadJobsAdmin();
            } else {
                document.getElementById('loginError').textContent = '❌ Contraseña incorrecta';
                document.getElementById('loginError').style.color = '#FC8181';
                setTimeout(() => {
                    document.getElementById('loginError').textContent = '';
                }, 3000);
            }
        }

        function logoutAdmin() {
            if (confirm('¿Seguro que quieres cerrar sesión?')) {
                sessionStorage.removeItem('maestromx_admin');
                document.getElementById('loginContainer').style.display = 'block';
                document.getElementById('adminPanel').style.display = 'none';
                document.getElementById('adminPassword').value = '';
            }
        }

        // ============================================
        // CARGAR TRABAJOS
        // ============================================
        function loadJobsAdmin() {
            try {
                const local = localStorage.getItem(STORAGE_KEY);
                if (local) {
                    jobs = JSON.parse(local);
                } else {
                    jobs = SAMPLE_JOBS;
                    saveToLocal();
                }
            } catch (e) {
                jobs = SAMPLE_JOBS;
                saveToLocal();
            }
            renderJobs();
            updateStats();
        }

        function saveToLocal() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(jobs));
        }

        // ============================================
        // RENDERIZAR LISTA
        // ============================================
        function renderJobs() {
            const container = document.getElementById('jobsList');
            if (jobs.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center;padding:3rem;background:white;border-radius:16px;color:#8A94A6;">
                        <p style="font-size:3rem;margin-bottom:0.5rem;">📭</p>
                        <p>No hay trabajos publicados</p>
                        <p style="font-size:0.8rem;">Haz clic en "Nuevo Trabajo" para empezar</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = jobs.map((job, i) => `
                <div class="job-item">
                    <div class="info">
                        <div class="title">
                            <span class="status-badge status-${job.status}">${getStatusEmoji(job.status)} ${getStatusText(job.status)}</span>
                            ${job.title}
                        </div>
                        <div class="meta">
                            ${job.category} · 📍 ${job.location} · 💰 ${job.price}
                            ${job.code ? `· 📌 ${job.code}` : ''}
                            ${job.date ? `· 📅 ${job.date}` : ''}
                        </div>
                    </div>
                    <div class="actions">
                        <button class="btn-sm edit" onclick="editJob(${i})"><i class="fas fa-edit"></i></button>
                        <button class="btn-sm delete" onclick="deleteJob(${i})"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        // ============================================
        // ESTADÍSTICAS
        // ============================================
        function updateStats() {
            const total = jobs.length;
            const available = jobs.filter(j => j.status === 'available').length;
            const progress = jobs.filter(j => j.status === 'progress').length;
            const closed = jobs.filter(j => j.status === 'closed').length;
            document.getElementById('statTotal').textContent = total;
            document.getElementById('statAvailable').textContent = available;
            document.getElementById('statProgress').textContent = progress;
            document.getElementById('statClosed').textContent = closed;
        }

        // ============================================
        // FORMULARIO
        // ============================================
        function showNewJobForm() {
            editIndex = null;
            document.getElementById('formTitle').textContent = '➕ Nuevo Trabajo';
            document.getElementById('editJobId').value = '';
            document.getElementById('jobForm').style.display = 'block';
            clearForm();
            document.getElementById('jobForm').scrollIntoView({ behavior: 'smooth' });
        }

        function editJob(index) {
            editIndex = index;
            const job = jobs[index];
            document.getElementById('formTitle').textContent = '✏️ Editar Trabajo';
            document.getElementById('editJobId').value = index;
            document.getElementById('jobForm').style.display = 'block';
            
            document.getElementById('jobTitle').value = job.title || '';
            document.getElementById('jobCategory').value = job.category || '';
            document.getElementById('jobLocation').value = job.location || '';
            document.getElementById('jobPrice').value = job.price || '';
            document.getElementById('jobDate').value = job.date || '';
            document.getElementById('jobTime').value = job.time || '';
            document.getElementById('jobStatus').value = job.status || 'available';
            document.getElementById('jobCode').value = job.code || '';
            document.getElementById('jobDescription').value = job.description || '';
            document.getElementById('contactPhone').value = job.contact?.phone || '';
            document.getElementById('contactWhatsapp').value = job.contact?.whatsapp || '';
            document.getElementById('contactEmail').value = job.contact?.email || '';
            document.getElementById('contactWebsite').value = job.contact?.website || '';
            
            document.getElementById('jobForm').scrollIntoView({ behavior: 'smooth' });
        }

        function cancelForm() {
            document.getElementById('jobForm').style.display = 'none';
            clearForm();
        }

        function clearForm() {
            document.querySelectorAll('#jobForm input, #jobForm textarea, #jobForm select').forEach(el => {
                if (el.type !== 'hidden') el.value = '';
            });
        }

        // ============================================
        // GUARDAR
        // ============================================
        function saveJob() {
            const job = {
                id: Date.now(),
                title: document.getElementById('jobTitle').value.trim(),
                category: document.getElementById('jobCategory').value,
                location: document.getElementById('jobLocation').value.trim(),
                price: document.getElementById('jobPrice').value.trim(),
                date: document.getElementById('jobDate').value,
                time: document.getElementById('jobTime').value,
                status: document.getElementById('jobStatus').value,
                code: document.getElementById('jobCode').value.trim() || `MX-${new Date().getFullYear()}-${String(jobs.length+1).padStart(3,'0')}`,
                description: document.getElementById('jobDescription').value.trim(),
                contact: {
                    phone: document.getElementById('contactPhone').value.trim(),
                    whatsapp: document.getElementById('contactWhatsapp').value.trim(),
                    email: document.getElementById('contactEmail').value.trim(),
                    website: document.getElementById('contactWebsite').value.trim()
                },
                views: 0,
                created_at: new Date().toISOString()
            };

            if (!job.title || !job.location || !job.description) {
                alert('⚠️ Título, Ubicación y Descripción son obligatorios');
                return;
            }

            const editId = document.getElementById('editJobId').value;
            if (editId !== '') {
                const idx = parseInt(editId);
                job.id = jobs[idx].id;
                job.views = jobs[idx].views || 0;
                job.created_at = jobs[idx].created_at;
                jobs[idx] = job;
            } else {
                jobs.push(job);
            }

            saveToLocal();
            renderJobs();
            updateStats();
            cancelForm();
            alert('✅ Trabajo guardado correctamente');
        }

        // ============================================
        // ELIMINAR
        // ============================================
        function deleteJob(index) {
            if (confirm(`¿Eliminar "${jobs[index].title}"?`)) {
                jobs.splice(index, 1);
                saveToLocal();
                renderJobs();
                updateStats();
                alert('✅ Trabajo eliminado');
            }
        }

        // ============================================
        // EXPORTAR
        // ============================================
        function exportJobs() {
            if (jobs.length === 0) {
                alert('⚠️ No hay trabajos para exportar');
                return;
            }
            const blob = new Blob([JSON.stringify(jobs, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `trabajos_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // ============================================
        // UTILIDADES
        // ============================================
        function getStatusEmoji(status) {
            const map = { 'available': '🟢', 'progress': '🟡', 'closed': '🔴' };
            return map[status] || '⚪';
        }
        function getStatusText(status) {
            const map = { 'available': 'Disponible', 'progress': 'En proceso', 'closed': 'Cerrado' };
            return map[status] || status;
        }

        // ============================================
        // AUTO-LOGIN
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            if (sessionStorage.getItem('maestromx_admin') === 'logged') {
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                loadJobsAdmin();
            }
        });
    </script>

</body>
</html>
